<div class="relative h-screen w-full">
  <div #mapContainer class="h-full w-full z-0"></div>

  <!-- Top Overlay -->
  <div *ngIf="activePage === 'work-map'" class="absolute top-4 left-4 right-4 z-10">
    <div class="flex items-center gap-3">
      <!-- Search -->
      <input
        type="text"
        placeholder="Search region..."
        class="w-full rounded-2xl bg-white shadow-lg px-4 py-3 focus:outline-none"
      />

      <button class="rounded-2xl bg-white shadow-lg p-3 hover:bg-gray-100">☰</button>
    </div>

    <div class="flex gap-3 mt-3">
      <select class="flex-1 rounded-lg bg-white shadow px-4 py-3 text-base">
        <option>All</option>
      </select>

      <select class="flex-1 rounded-lg bg-white shadow px-4 py-3 text-base">
        <option>100%</option>
      </select>
    </div>
  </div>

  <div class="absolute bottom-0 left-0 right-0 z-10 p-4">
    <div class="bg-white rounded-2xl shadow-xl p-4">
      <p class="font-semibold">Available Work Packages</p>
      <p class="text-sm text-gray-500"></p>
    </div>
  </div>
</div>
